services:
  postgres:
    image: postgres:16
    container_name: mini-bank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
      POSTGRES_DB: bank
    ports:
      - "5437:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bank"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: